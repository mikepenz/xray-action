name: 'CI'
on:
  push:
    tags:
      - '*'
  pull_request:

jobs:
  build:
    if: github.event_name  == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '24'

      - name: Install NPM
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run NPM
        run: npm run all
        env:
          XRAY_USERNAME: ${{ secrets.XRAY_USERNAME }}
          XRAY_PASSWORD: ${{ secrets.XRAY_PASSWORD }}

  commit-dist:
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'renovate/') &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor == github.repository_owner
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.head_ref }}
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run build && npm run package
      - name: Commit rebuilt dist
        run: |
          git config user.name "Mike Penz"
          git config user.email "opensource-bot@mikepenz.dev"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: rebuild dist for renovate"
          git push "https://x-access-token:${{ secrets.RENOVATE_TOKEN }}@github.com/${{ github.repository }}.git" "HEAD:${{ github.event.pull_request.head.ref }}"

  test:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: "Run imports"
        uses: ./
        with:
          username: ${{ secrets.XRAY_USERNAME }}
          password: ${{ secrets.XRAY_PASSWORD }}
          xrayCloud: "false"
          xrayBaseUrl: "https://xray-demo3.xpand-it.com"
          testFormat: "junit"
          testPaths: "marathon_tests/*.xml"
          testPlanKey: "GHXA-9"
          projectKey: "GHXA"
          combineInSingleTestExec: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '24'

      - name: Build dist
        run: npm ci && npm audit --audit-level=high && npm run build && npm run package

      - name: Attest dist provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4
        with:
          subject-path: dist/

      - name: "Build Changelog"
        id: github_release
        uses: mikepenz/release-changelog-builder-action@2cb9befdbc05f65b8354cc9873cd506509bd0782  # v6
        with:
          configuration: ".github/config/configuration.json"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: mikepenz/action-gh-release@5c3d16ffbdc3e0fbfe2c8a69a448798f5d9b30c2  # v2
        with:
          body: ${{steps.github_release.outputs.changelog}}
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-b') || contains(github.ref, '-a') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
