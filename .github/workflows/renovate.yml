name: Renovate
on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 3am UTC
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    if: github.event_name == 'schedule' || github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: renovatebot/github-action@ea850436a5fe75c0925d583c7a02c60a5865461d  # v43.0.20
        with:
          configurationFile: renovate.json
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          RENOVATE_REPOSITORIES: '["${{ github.repository }}"]'
          RENOVATE_PLATFORM: github
          RENOVATE_USERNAME: mikepenz
          RENOVATE_GIT_AUTHOR: "Mike Penz <opensource-bot@mikepenz.dev>"
          RENOVATE_ONBOARDING: "false"
          RENOVATE_REQUIRE_CONFIG: optional
